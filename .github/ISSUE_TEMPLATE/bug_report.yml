name: Bug report
description: Report a reproducible defect in XQ Proof Lab.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please remove local paths, credentials, private game records, and other sensitive data.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "1.0.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Python version and operating system, but omit usernames and machine paths.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
